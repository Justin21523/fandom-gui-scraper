[pytest]
# Pytest configuration for Fandom GUI Scraper

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Console output settings
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require database or network)
    gui: GUI-related tests (require PyQt)
    slow: Slow tests (long-running operations)
    scraper: Scraper-related tests

# Timeout settings (requires pytest-timeout)
# timeout = 30

# Logging
log_cli = true
log_cli_level = WARNING

# Coverage settings (requires pytest-cov)
# Run with: pytest --cov=. --cov-report=html

# Async mode (requires pytest-asyncio)
# asyncio_mode = auto

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
