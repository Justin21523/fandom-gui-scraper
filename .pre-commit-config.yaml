# Pre-commit hooks configuration
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3.10
        exclude: ^(tests/|venv/|\.venv/)

  # Python linting
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=120', '--extend-ignore=E203,W503']
        exclude: ^(tests/|venv/|\.venv/)

  # Python import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile', 'black', '--line-length', '120']
        exclude: ^(venv/|\.venv/)

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        additional_dependencies: [types-all]
        exclude: ^(tests/|venv/|\.venv/)
        args: ['--ignore-missing-imports', '--no-strict-optional']

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(\.gitignore|\.md)
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: detect-private-key
      - id: check-ast
      - id: debug-statements

  # YAML formatting
  - repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
    rev: 0.2.3
    hooks:
      - id: yamlfmt
        args: [--mapping, '2', --sequence, '2', --offset, '0']

  # Markdown linting
  - repo: https://github.com/markdownlint/markdownlint
    rev: v0.12.0
    hooks:
      - id: markdownlint
        args: ['--style', '.markdownlint.yml']
        exclude: ^(node_modules/|venv/|\.venv/)

  # JavaScript/JSON formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, json, markdown, yaml]
        exclude: ^(package-lock\.json|node_modules/)

  # Security checks
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(package-lock\.json|\.pre-commit-config\.yaml)

  # Python security
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml']
        additional_dependencies: ['bandit[toml]']
        exclude: ^tests/

  # Local hooks for tests
  - repo: local
    hooks:
      # Run Python unit tests
      - id: pytest-unit
        name: pytest unit tests
        entry: pytest tests/unit -v --tb=short -x
        language: system
        pass_filenames: false
        always_run: false
        stages: [commit]

      # Run Python quick tests (fast tests only)
      - id: pytest-quick
        name: pytest quick tests
        entry: pytest tests/unit -v --tb=short -x -m "not slow"
        language: system
        pass_filenames: false
        always_run: false
        stages: [push]

      # Check Python imports
      - id: check-python-imports
        name: check python imports
        entry: python -c "import sys; sys.path.insert(0, '.'); import api.main; import scraper.pipelines"
        language: system
        pass_filenames: false
        always_run: true

      # Frontend linting
      - id: eslint
        name: eslint
        entry: npm run lint
        language: system
        types: [javascript]
        pass_filenames: false
        files: ^frontend/js/

      # Frontend tests (optional - can be slow)
      - id: jest-unit
        name: jest unit tests
        entry: npm run test:unit -- --ci --bail
        language: system
        pass_filenames: false
        always_run: false
        stages: [push]

# Configuration for specific hooks
default_language_version:
  python: python3.10
  node: 18.0.0

# Stages
default_stages: [commit]

# Fail fast
fail_fast: false

# Minimum version
minimum_pre_commit_version: '2.20.0'
